<!doctype html>
<html lang="no">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Jobbsøker-tracker</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body class="locked">
<div class="bg"></div>

<header class="container header">
    <div class="headerLeft">
        <h1 id="t_title">Jobbsøker-tracker</h1>
        <p id="t_subtitle" class="muted">Hold oversikt over søknadene dine.</p>
    </div>

    <div class="headerRight">
        <button id="loginBtn" class="btn ghost" type="button">Logg inn</button>

        <span id="whoami" class="pill hidden"></span>
        <button id="logoutBtn" class="btn ghost hidden" type="button">Logg ut</button>

        <button id="langBtn" class="btn ghost" type="button">NO/EN</button>
    </div>
</header>

<main class="container grid">
    <!-- LEFT -->
    <section class="card">
        <h2 id="t_newTitle">Ny søknad</h2>

        <form id="createForm" class="form">
            <label>
                <span id="t_companyLabel">Firma *</span>
                <input id="companyInput" name="company" required placeholder="F.eks. NAV / Telenor" />
            </label>

            <label>
                <span id="t_roleLabel">Stilling *</span>
                <input id="roleInput" name="role" required placeholder="F.eks. Junior utvikler" />
            </label>

            <label>
                <span id="t_linkLabel">Link</span>
                <input id="linkInput" name="link" placeholder="https://..." />
            </label>

            <label>
                <span id="t_deadlineLabel">Frist</span>
                <input id="deadlineInput" name="deadline" type="date" />
            </label>

            <button id="t_addBtn" class="btn primary" type="submit">Legg til</button>
            <div id="formMsg" class="msg"></div>
        </form>

        <div id="lockedHint" class="hint">
            <span id="t_lockedHint">Logg inn for å lagre og se dine søknader.</span>
        </div>
    </section>

    <!-- RIGHT -->
    <section class="card">
        <div class="row">
            <h2 id="t_appsTitle">Søknader</h2>
            <div id="stats" class="pill smallPill">—</div>
        </div>

        <div class="filters">
            <button class="filter active" data-filter="ALL" id="t_f_all">Alle</button>
            <button class="filter" data-filter="PLANLAGT" id="t_f_planned">Planlagt</button>
            <button class="filter" data-filter="SOKT" id="t_f_applied">Søkt</button>
            <button class="filter" data-filter="INTERVJU" id="t_f_interview">Intervju</button>
            <button class="filter" data-filter="AVSLATT" id="t_f_rejected">Avslått</button>
            <button class="filter" data-filter="TILBUD" id="t_f_offer">Tilbud</button>
        </div>

        <div id="list" class="list">
            <div class="muted" id="emptyText">Ingen treff. Logg inn for å se dine søknader.</div>
        </div>
    </section>
</main>

<footer class="container footer muted">
    <span id="t_footer">Bygget med Java (Spring Boot) + vanilla JS + JWT.</span>
</footer>

<!-- AUTH MODAL -->
<div id="authModal" class="modal hidden" aria-hidden="true">
    <div class="modalBox" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <div class="modalTop">
            <h3 id="authTitle">Logg inn</h3>
            <button id="closeModal" class="iconBtn" type="button" aria-label="Close">✕</button>
        </div>

        <form id="authForm" class="modalForm">
            <input id="authEmail" type="email" autocomplete="email" placeholder="E-post" required />
            <input id="authPassword" type="password" autocomplete="current-password" placeholder="Passord" required />

            <div id="authMsg" class="msg"></div>

            <div class="modalActions">
                <button id="authSubmitBtn" class="btn primary" type="submit">Logg inn</button>
                <button id="toggleAuthMode" class="btn ghost" type="button">Opprett bruker</button>
            </div>
        </form>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
