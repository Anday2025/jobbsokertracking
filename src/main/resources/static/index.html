<!doctype html>
<html lang="no">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Jobbsøker-tracker</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="container header">
    <div>
        <h1>Jobbsøker-tracker</h1>
        <p class="muted">Hold oversikt over søknadene dine.</p>
    </div>

    <div class="authbar">
        <span id="whoami" class="pill">Ikke innlogget</span>
        <button id="logoutBtn" class="ghost hidden">Logg ut</button>
    </div>
</header>

<main class="container grid">
    <!-- AUTH CARD -->
    <section class="card" id="authCard">
        <h2>Logg inn</h2>

        <div class="tabs">
            <button class="tab active" data-tab="login">Logg inn</button>
            <button class="tab" data-tab="register">Registrer</button>
        </div>

        <form id="authForm" class="form">
            <label>
                E-post
                <input id="authEmail" type="email" required placeholder="navn@epost.no" autocomplete="email" />
            </label>

            <label>
                Passord
                <input id="authPassword" type="password" required placeholder="Minst 6 tegn" autocomplete="current-password" />
            </label>

            <button type="submit" id="authSubmitBtn">Logg inn</button>
            <div id="authMsg" class="msg"></div>
        </form>

        <div class="muted small" style="margin-top:10px">
            Tips: Bruk en e-post du husker. Passord lagres hash’et (BCrypt) i databasen.
        </div>
    </section>

    <!-- APP CARD -->
    <section class="card hidden" id="appCard">
        <div class="row">
            <h2>Søknader</h2>
            <div class="pill" id="stats">—</div>
        </div>

        <div class="filters">
            <button class="filter active" data-filter="ALL">Alle</button>
            <button class="filter" data-filter="PLANLAGT">Planlagt</button>
            <button class="filter" data-filter="SOKT">Søkt</button>
            <button class="filter" data-filter="INTERVJU">Intervju</button>
            <button class="filter" data-filter="AVSLATT">Avslått</button>
            <button class="filter" data-filter="TILBUD">Tilbud</button>
        </div>

        <div class="split">
            <section class="subcard">
                <h3>Ny søknad</h3>
                <form id="createForm" class="form">
                    <label>
                        Firma *
                        <input name="company" required placeholder="F.eks. NAV / Telenor" />
                    </label>
                    <label>
                        Stilling *
                        <input name="role" required placeholder="F.eks. Junior utvikler" />
                    </label>
                    <label>
                        Link
                        <input name="link" placeholder="https://..." />
                    </label>
                    <label>
                        Frist
                        <input name="deadline" type="date" />
                    </label>

                    <button type="submit">Legg til</button>
                    <div id="formMsg" class="msg"></div>
                </form>
            </section>

            <section class="subcard">
                <h3>Liste</h3>
                <div id="list" class="list"></div>
            </section>
        </div>
    </section>
</main>

<footer class="container muted small">
    Bygget med Java (Spring Boot) + vanilla JS + JWT.
</footer>

<script src="app.js"></script>
</body>
</html>
