<!doctype html>
<html lang="no">
<!--
=========================================
Jobbsøkertracking - Frontend UI
=========================================

Beskrivelse:
En enkel webapplikasjon for å holde oversikt over jobbsøknader.

Funksjonalitet:
- Registrering og innlogging
- Oppretting og administrasjon av søknader
- Filtrering på status
- Progressbar og statistikk
- Språkvalg (NO/EN)

Teknologi:
- HTML
- CSS
- Vanilla JavaScript
- Spring Boot backend via REST API
-->
<head>
    <!-- =========================================
         HEAD / METADATA
         Tegnsett, mobiltilpasning, tittel og CSS
    ========================================= -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>jobbsokertracking</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

<!-- =========================================
     DECORATIVE BACKGROUND GLOW
     Ekstra visuelt lag styrt av CSS
========================================= -->
<div class="bgGlow"></div>

<!-- =========================================
     HEADER / TOP BAR
     Logo, brukerstatus, auth-knapper og språkvalg
========================================= -->
<header class="container header">
    <a class="brand" href="/" aria-label="Gå til forsiden">
        <div class="logoText" aria-label="jobbsokertracking">
            <span class="logoGray">jobbsoker</span><span class="logoAccent">tracking</span>
        </div>
        <p class="muted" id="t_subtitle">Hold oversikt over søknadene dine.</p>
    </a>

    <div class="headerRight">
        <button id="loginBtn" class="btn ghost" type="button">Logg inn</button>

        <span id="whoami" class="pill hidden">—</span>
        <button id="logoutBtn" class="btn ghost hidden" type="button">Logg ut</button>

        <button id="langBtn" class="btn ghost" type="button">NO/EN</button>
    </div>
</header>

<!-- =========================================
     MAIN CONTENT (Grid layout)
     - Venstre: Opprette søknad
     - Høyre: Liste, statistikk og filter
========================================= -->
<main class="container grid" id="main">

    <!-- =========================================
         LEFT PANEL
         Form for oppretting av ny jobbsøknad
    ========================================= -->
    <section class="card" id="leftCard">
        <h2 id="t_newAppTitle">Ny søknad</h2>

        <form id="createForm" class="form">
            <label>
                <span id="t_companyLabel">Firma *</span>
                <input name="company" required placeholder="F.eks. DNB / Telenor" id="t_companyPh" />
            </label>

            <label>
                <span id="t_roleLabel">Stilling *</span>
                <input name="role" required placeholder="F.eks. Junior utvikler" id="t_rolePh" />
            </label>

            <label>
                <span id="t_linkLabel">Link</span>
                <input name="link" placeholder="https://..." id="t_linkPh" />
            </label>

            <label>
                <span id="t_deadlineLabel">Frist</span>
                <input name="deadline" type="date" />
            </label>

            <button class="btn primary" type="submit" id="t_addBtn">Legg til</button>
            <div id="formMsg" class="msg"></div>

            <div class="hint muted small" id="t_loginHint">
                Logg inn for å lagre og se dine søknader
            </div>
        </form>
    </section>

    <!-- =========================================
         RIGHT PANEL
         Søknadsliste, statistikk, progress og filtre
    ========================================= -->
    <section class="card" id="rightCard">
        <div class="row">
            <h2 id="t_appsTitle">Søknader</h2>

            <!-- =========================================
                 STATS + PROGRESS
            ========================================= -->
            <div class="statsBox">
                <div class="pill" id="stats">—</div>

                <div class="progressWrap" aria-label="Jobbsøker fremdrift">
                    <div class="progressTop">
                        <span class="progressLabel" id="progressLabel">—</span>
                        <span class="progressPct" id="progressPct">—</span>
                    </div>

                    <div class="progressBar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                        <div class="progressFill" id="progressFill"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- =========================================
             FILTER BUTTONS
        ========================================= -->
        <div class="filters">
            <button class="filter active" data-filter="ALL" id="t_f_all">Alle</button>
            <button class="filter" data-filter="PLANLAGT" id="t_f_planned">Planlagt</button>
            <button class="filter" data-filter="SOKT" id="t_f_applied">Søkt</button>
            <button class="filter" data-filter="INTERVJU" id="t_f_interview">Intervju</button>
            <button class="filter" data-filter="AVSLATT" id="t_f_rejected">Avslått</button>
            <button class="filter" data-filter="TILBUD" id="t_f_offer">Tilbud</button>
        </div>

        <!-- =========================================
             APPLICATION LIST
             Fylles dynamisk av app.js
        ========================================= -->
        <div id="list" class="list">
            <div class="muted" id="t_emptyLogin">Ingen treff. Logg inn for å se dine søknader.</div>
        </div>
    </section>
</main>

<!-- =========================================
     FOOTER
========================================= -->
<footer class="container muted small" id="t_footer">
    Jobbsokertracking-webappen er under aktiv utvikling og er ennå ikke ferdigstilt! <br> Anday.
</footer>

<!-- =========================================
     AUTH MODAL
     Login / register / forgot / reset password
========================================= -->
<div id="authModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="authTitle">
    <div class="modalCard">
        <div class="modalTop">
            <h3 id="authTitle">Logg inn</h3>
            <button id="closeAuth" class="iconBtn" type="button" aria-label="Lukk">×</button>
        </div>
        <form id="authForm" class="modalForm"></form>
    </div>
</div>

<!-- =========================================
     JAVASCRIPT
     app.js håndterer auth, API-kall og UI-rendering
========================================= -->
<script src="app.js" defer></script>

</body>
</html>
